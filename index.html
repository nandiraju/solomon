<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Virtual Avatar Widget - Responsive Embed">
  <title>Anam AI Virtual Avatar</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

    :root {
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'Fira Code', monospace;

      --bg-darker: #05060b;
      --bg-glass: rgba(10, 15, 30, 0.4);
      --container-border: rgba(255, 255, 255, 0.08);
      --shadow-color: rgba(0, 0, 0, 0.7);
      
      --accent-color: #6366f1; /* default indigo */
      --accent-glow: rgba(99, 102, 241, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-darker);
      font-family: var(--font-sans);
      color: #f3f4f6;
      -webkit-font-smoothing: antialiased;
    }

    /* App wrapper matching LumenLoops app-wrapper style */
    .app-wrapper {
      position: relative;
      height: 100%;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 0% 0%, rgba(88, 28, 135, 0.12) 0%, transparent 40%),
                  radial-gradient(circle at 100% 100%, rgba(29, 78, 216, 0.12) 0%, transparent 45%),
                  #05060a;
    }

    /* Ambient technical grid overlay */
    .app-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 2;
    }

    /* Background video styles */
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
      pointer-events: none;
      transform: scale(1.02);
      z-index: 1;
    }

    /* Header matching LumenLoops navigation bar */
    .top-header {
      height: 70px;
      background: rgba(7, 10, 19, 0.85);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: relative;
      z-index: 100;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .zap-icon {
      width: 22px;
      height: 22px;
      color: var(--accent-color);
      filter: drop-shadow(0 0 8px var(--accent-color));
      transition: color 0.3s, filter 0.3s;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .style-tabs {
      display: flex;
      gap: 4px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .tab-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #9ca3af;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .tab-btn:hover:not(.active) {
      color: #fff;
    }

    .control-area {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .color-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transform: scale(1);
      transition: all 0.2s;
    }

    .dot.active {
      border: 2px solid #fff;
      transform: scale(1.15);
    }

    .select-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .custom-select {
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 6px 12px;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
      text-transform: capitalize;
      transition: border-color 0.2s;
    }

    .custom-select:focus {
      border-color: var(--accent-color);
    }

    /* Style Banner matching LumenLoops */
    .style-banner {
      background: rgba(255,255,255,0.01);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      padding: 10px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #6b7280;
      font-size: 11px;
      font-family: var(--font-mono);
      z-index: 10;
      position: relative;
      flex-shrink: 0;
    }

    /* Main display workspace centered on screen */
    .main-content {
      flex-grow: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 5;
      padding: 24px;
    }

    /* Glassmorphic Central Card layout */
    .glass-card-base {
      width: 90vw;
      max-width: min(850px, calc(65vh * 16 / 9)); /* responsive height limit constraint */
      aspect-ratio: 16 / 9;
      background: var(--bg-glass);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      overflow: visible; /* MUST be visible so the widget's absolute controls/overlays are not clipped */
      box-shadow: 
        0 40px 100px -20px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card-base:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    anam-agent {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Custom scrollbars inside shadow DOM if applicable */
    ::-webkit-scrollbar {
      width: 6px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.01);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <!-- Background Loop Video (LumenLoops Asset) -->
    <video autoplay loop muted playsinline class="bg-video" id="bg-video">
      <source src="assets/Videos/mp4/indigo/grid_4.mp4" type="video/mp4" id="bg-video-source">
    </video>

    <!-- Top Header Navigation -->
    <header class="top-header">
      <!-- Brand Area -->
      <div class="logo-area">
        <svg class="zap-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="brand-name">LUMENLOOPS</span>
      </div>
      
      <!-- Layout Style Tabs -->
      <div class="style-tabs">
        <button class="tab-btn" data-style="minimalist">Centered Minimalist</button>
        <button class="tab-btn active" data-style="panel">Centered Panel</button>
        <button class="tab-btn" data-style="split">Split Screen</button>
      </div>
      
      <!-- Control Area (Dots + Dropdowns) -->
      <div class="control-area">
        <!-- Quick Colors -->
        <div class="color-dots">
          <span class="dot active" data-color="indigo" style="background-color: #6366f1;"></span>
          <span class="dot" data-color="fuchsia" style="background-color: #d946ef;"></span>
          <span class="dot" data-color="cyan" style="background-color: #06b6d4;"></span>
          <span class="dot" data-color="emerald" style="background-color: #10b981;"></span>
        </div>
        
        <!-- Color Selector -->
        <div class="select-wrapper">
          <select class="custom-select" id="color-select">
            <option value="indigo">Indigo</option>
            <option value="fuchsia">Fuchsia</option>
            <option value="cyan">Cyan</option>
            <option value="emerald">Emerald</option>
            <option value="amber">Amber</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="orange">Orange</option>
            <option value="pink">Pink</option>
            <option value="purple">Purple</option>
            <option value="red">Red</option>
            <option value="rose">Rose</option>
            <option value="sky">Sky</option>
            <option value="violet">Violet</option>
            <option value="yellow">Yellow</option>
          </select>
        </div>

        <!-- Video Selector -->
        <div class="select-wrapper">
          <select class="custom-select" id="video-select">
            <option value="grid_4">Default (Style Preset)</option>
            <option value="tunnel">Zoom Tunnel</option>
            <option value="arc">Arc Loop</option>
            <option value="background">Ambient Background</option>
            <option value="grid_1">Scanning Grid 1</option>
            <option value="grid_2">Wireframe Grid 2</option>
            <option value="grid_3">Topographic Grid 3</option>
            <option value="orb">Plasma Orb</option>
            <option value="portal">Cosmic Portal</option>
            <option value="pulse">Expanding Pulse</option>
            <option value="pulse_dot">Dotted Pulse</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Style Banner Metadata -->
    <div class="style-banner">
      <div style="display: flex; align-items: center; gap: 6px;">
        <svg style="width:12px; height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        <span id="banner-style-text">ACTIVE STYLE: PANEL</span>
      </div>
      <div style="display: flex; gap: 16px;">
        <span id="banner-video-text">VIDEO: DEFAULT_PRESET</span>
        <span id="banner-theme-text">THEME: INDIGO</span>
      </div>
    </div>

    <!-- Main Centered Content Grid -->
    <main class="main-content">
      <!-- Glassmorphic Card Container -->
      <section class="glass-card-base">
        <anam-agent agent-id="4c2e9235-c739-42bf-9c87-97a77dcfb07a" layout="inline"></anam-agent>
      </section>
    </main>
  </div>

  <!-- Interactive Controls JavaScript -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const agent = document.querySelector('anam-agent');
      if (!agent) return;

      // Script to programmatically remove the Anam watermark from the Shadow DOM
      const purgeWatermark = () => {
        if (!agent.shadowRoot) return;
        const allElements = agent.shadowRoot.querySelectorAll('*');
        allElements.forEach(el => {
          if (el.childNodes.length === 1 && el.textContent.trim().toLowerCase() === 'anam') {
            el.style.setProperty('display', 'none', 'important');
          }
          const classStr = String(el.className || '').toLowerCase();
          const idStr = String(el.id || '').toLowerCase();
          if (classStr.includes('watermark') || classStr.includes('branding') || idStr.includes('watermark') || idStr.includes('branding')) {
            el.style.setProperty('display', 'none', 'important');
          }
        });
      };

      // Periodic check to handle dynamic re-renders inside the Web Component
      setInterval(purgeWatermark, 250);

      // Instantly run on session start and clicks
      agent.addEventListener('anam-agent:session-started', purgeWatermark);
      agent.addEventListener('click', purgeWatermark);

      // Interactive Controls logic matching LumenLoops system
      const colorDots = document.querySelectorAll('.dot');
      const colorSelect = document.getElementById('color-select');
      const videoSelect = document.getElementById('video-select');
      const tabBtns = document.querySelectorAll('.tab-btn');
      const bgVideo = document.getElementById('bg-video');
      const bgVideoSource = document.getElementById('bg-video-source');
      const zapIcon = document.querySelector('.zap-icon');
      
      const bannerStyle = document.getElementById('banner-style-text');
      const bannerVideo = document.getElementById('banner-video-text');
      const bannerTheme = document.getElementById('banner-theme-text');

      let currentColor = 'indigo';
      let currentVideo = 'grid_4';
      let currentStyle = 'panel';

      const colorMap = {
        amber: '#f59e0b',
        blue: '#3b82f6',
        cyan: '#06b6d4',
        emerald: '#10b981',
        fuchsia: '#d946ef',
        gray: '#6b7280',
        green: '#22c55e',
        indigo: '#6366f1',
        lime: '#84cc16',
        neutral: '#737373',
        orange: '#f97316',
        pink: '#ec4899',
        purple: '#a855f7',
        red: '#ef4444',
        rose: '#f43f5e',
        sky: '#0ea5e9',
        slate: '#64748b',
        stone: '#78716c',
        teal: '#14b8a6',
        violet: '#8b5cf6',
        yellow: '#eab308',
        zinc: '#71717a'
      };

      const updateTheme = (color) => {
        currentColor = color;
        const hex = colorMap[color] || '#6366f1';
        
        // Update CSS variables for live accent highlights
        document.documentElement.style.setProperty('--accent-color', hex);
        document.documentElement.style.setProperty('--accent-glow', `${hex}26`); // 15% opacity hex
        if (zapIcon) {
          zapIcon.style.filter = `drop-shadow(0 0 8px ${hex})`;
        }

        // Update selected dot visual state if applicable
        colorDots.forEach(dot => {
          if (dot.dataset.color === color) {
            dot.classList.add('active');
          } else {
            dot.classList.remove('active');
          }
        });

        // Sync inputs & labels
        if (colorSelect) colorSelect.value = color;
        if (bannerTheme) bannerTheme.textContent = `THEME: ${color.toUpperCase()}`;

        // Reload video stream
        loadVideo();
      };

      const loadVideo = () => {
        if (!bgVideo || !bgVideoSource) return;
        bgVideoSource.src = `assets/Videos/mp4/${currentColor}/${currentVideo}.mp4`;
        bgVideo.load();
        bgVideo.play().catch(err => console.log('Autoplay blocked:', err));
        if (bannerVideo) {
          bannerVideo.textContent = `VIDEO: ${currentVideo === 'grid_4' ? 'DEFAULT_PRESET' : currentVideo.toUpperCase()}`;
        }
      };

      // Dot Clicks
      colorDots.forEach(dot => {
        dot.addEventListener('click', () => {
          updateTheme(dot.dataset.color);
        });
      });

      // Dropdown Color change
      if (colorSelect) {
        colorSelect.addEventListener('change', (e) => {
          updateTheme(e.target.value);
        });
      }

      // Dropdown Video change
      if (videoSelect) {
        videoSelect.addEventListener('change', (e) => {
          currentVideo = e.target.value;
          loadVideo();
        });
      }

      // Tabs click
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          tabBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentStyle = btn.dataset.style;
          if (bannerStyle) bannerStyle.textContent = `ACTIVE STYLE: ${currentStyle.toUpperCase()}`;
          
          // Switch video based on active style tab selection
          if (currentStyle === 'minimalist') {
            currentVideo = 'background';
          } else if (currentStyle === 'panel') {
            currentVideo = 'grid_4';
          } else if (currentStyle === 'split') {
            currentVideo = 'tunnel';
          }
          if (videoSelect) videoSelect.value = currentVideo;
          loadVideo();
        });
      });

      // Initial theme trigger
      updateTheme('indigo');
    });
  </script>

  <!-- Anam AI Script (Loaded Async) -->
  <script src="https://unpkg.com/@anam-ai/agent-widget" async></script>
</body>
</html>
