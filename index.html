<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Virtual Avatar Widget - Responsive Embed">
  <title>Anam AI Virtual Avatar</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap');

    :root {
      --bg-gradient: radial-gradient(circle at center, #111019 0%, #050508 100%);
      --accent-color: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.15);
      --container-border: rgba(255, 255, 255, 0.08);
      --shadow-color: rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Ambient background glow for a premium feel */
    body::before {
      content: "";
      position: absolute;
      width: 50vw;
      height: 50vw;
      max-width: 600px;
      max-height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Layout wrapper */
    .app-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      z-index: 1;
    }

    /* Responsive container with aspect ratio control (16:9 to match the video stream) */
    .widget-container {
      position: relative;
      width: 90vw;
      max-width: min(850px, calc(70vh * 16 / 9)); /* caps sizing dynamically based on width and height constraints */
      aspect-ratio: 16 / 9;
      background-color: #000;
      border: 1px solid var(--container-border);
      border-radius: 20px;
      overflow: visible; /* MUST be visible so the widget's absolute controls/overlays are not clipped */
      box-shadow: 
        0 25px 50px -12px var(--shadow-color),
        0 0 40px rgba(139, 92, 246, 0.05);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .widget-container:hover {
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 
        0 30px 60px -12px var(--shadow-color),
        0 0 50px rgba(139, 92, 246, 0.1);
    }

    anam-agent {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Premium Stop Interaction Icon Button */
    .stop-btn {
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 
        0 10px 25px -5px rgba(239, 68, 68, 0.4),
        0 0 20px rgba(239, 68, 68, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stop-btn svg {
      width: 26px;
      height: 26px;
    }

    .stop-btn:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 15px 30px -5px rgba(239, 68, 68, 0.5),
        0 0 30px rgba(239, 68, 68, 0.25);
      filter: brightness(1.1);
    }

    .stop-btn:active {
      transform: translateY(1px);
      box-shadow: 
        0 5px 12px -5px rgba(239, 68, 68, 0.4),
        0 0 15px rgba(239, 68, 68, 0.1);
    }

    /* Custom scrollbars inside shadow DOM if applicable */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-color);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <!-- Responsive Widget Container -->
    <main class="widget-container">
      <anam-agent agent-id="4c2e9235-c739-42bf-9c87-97a77dcfb07a" layout="inline"></anam-agent>
    </main>

    <!-- Stop Interaction Trigger Button (Icon Only) -->
    <button type="button" class="stop-btn" id="stop-btn" title="Stop Interaction">
      <!-- Standard phone hang-up/disconnect icon -->
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 9c-2.2 0-4.3.4-6.2 1.1-.6.2-1 .7-1 1.3V15c0 .6.5 1.1 1.1 1.1.9 0 1.8-.1 2.6-.4.5-.2.9-.6.9-1.2v-2.2c1.7-.5 3.5-.8 5.6-.8s3.9.3 5.6.8v2.2c0 .6.4 1 1 1.2.8.3 1.7.4 2.6.4.6 0 1.1-.5 1.1-1.1v-3.6c0-.6-.4-1.1-1-1.3-1.9-.7-4-1.1-6.2-1.1z"/>
      </svg>
    </button>
  </div>

  <!-- Script to programmatically remove the Anam watermark from the Shadow DOM -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const agent = document.querySelector('anam-agent');
      const stopBtn = document.getElementById('stop-btn');
      if (!agent) return;

      const purgeWatermark = () => {
        if (!agent.shadowRoot) return;
        const allElements = agent.shadowRoot.querySelectorAll('*');
        allElements.forEach(el => {
          // Hide text element that says exactly "Anam"
          if (el.childNodes.length === 1 && el.textContent.trim().toLowerCase() === 'anam') {
            el.style.setProperty('display', 'none', 'important');
          }
          // Hide elements with watermark/branding in class names or ids
          const classStr = String(el.className || '').toLowerCase();
          const idStr = String(el.id || '').toLowerCase();
          if (classStr.includes('watermark') || classStr.includes('branding') || idStr.includes('watermark') || idStr.includes('branding')) {
            el.style.setProperty('display', 'none', 'important');
          }
        });
      };

      // Stop interaction logic
      if (stopBtn) {
        stopBtn.addEventListener('click', () => {
          // Visual scale effect
          stopBtn.style.transform = 'scale(0.95)';
          setTimeout(() => stopBtn.style.transform = 'scale(1)', 100);

          // 1. Try to pierce Shadow DOM and trigger the built-in End Call click handler
          if (agent.shadowRoot) {
            const closeBtn = agent.shadowRoot.querySelector('.anam-close-btn');
            if (closeBtn) {
              closeBtn.click();
              return;
            }
          }
          
          // 2. Fallback: Force detach and re-attach widget to terminate WebRTC stream
          const parent = agent.parentNode;
          const nextSib = agent.nextSibling;
          parent.removeChild(agent);
          parent.insertBefore(agent, nextSib);
        });
      }

      // Periodic check to handle dynamic re-renders inside the Web Component
      setInterval(purgeWatermark, 250);

      // Instantly run on session start and clicks
      agent.addEventListener('anam-agent:session-started', purgeWatermark);
      agent.addEventListener('click', purgeWatermark);
    });
  </script>

  <!-- Anam AI Script (Loaded Async) -->
  <script src="https://unpkg.com/@anam-ai/agent-widget" async></script>
</body>
</html>
