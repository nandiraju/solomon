<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Virtual Avatar Widget - Responsive Embed">
  <title>Anam AI Virtual Avatar</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-display: 'Space Grotesk', sans-serif;

      --bg-darker: #05060b;
      --bg-glass: rgba(10, 15, 30, 0.4);
      --container-border: rgba(255, 255, 255, 0.08);
      --shadow-color: rgba(0, 0, 0, 0.7);

      --accent-color: #10b981; /* emerald */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at 0% 0%, rgba(88, 28, 135, 0.12) 0%, transparent 40%),
                  radial-gradient(circle at 100% 100%, rgba(29, 78, 216, 0.12) 0%, transparent 45%),
                  #05060a;
      font-family: var(--font-sans);
      color: #f3f4f6;
      -webkit-font-smoothing: antialiased;
    }

    /* App wrapper matching LumenLoops app-wrapper style */
    .app-wrapper {
      position: relative;
      height: 100%;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: transparent; /* Set to transparent so the background video shows through */
      z-index: 2;
    }

    /* Ambient technical grid overlay */
    .app-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 2;
    }

    /* Background video styles - responsive fixed positioning at z-index -1 */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0.85; /* Increased opacity for clear visibility */
      pointer-events: none;
      transform: scale(1.05);
      z-index: -1; /* Placed behind content layer but on top of body backdrop gradients */
      filter: brightness(0.65) saturate(0.9); /* Brighter filter for sharp visual feedback */
    }

    /* Main display workspace centered on screen */
    .main-content {
      flex-grow: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 5;
      padding: 24px;
    }

    /* Glassmorphic Central Card layout */
    .glass-card-base {
      width: 90vw;
      max-width: min(850px, calc(80vh * 16 / 9));
      /* responsive height limit constraint */
      aspect-ratio: 16 / 9;
      background: var(--bg-glass);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      overflow: visible;
      /* MUST be visible so the widget's absolute controls/overlays are not clipped */
      box-shadow:
        0 40px 100px -20px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    anam-agent {
      width: 100%;
      height: 100%;
      display: block;
      transform: translateY(-10px);
    }
  </style>
</head>

<body>

  <!-- Zoom Tunnel Background Video (LumenLoops Asset) -->
  <video autoplay loop muted playsinline class="bg-video" id="bg-video">
    <source src="assets/Videos/mp4/emerald/tunnel.mp4" type="video/mp4">
  </video>

  <div class="app-wrapper">

    <!-- Main Centered Content Grid -->
    <main class="main-content">
      <!-- Glassmorphic Card Container -->
      <section class="glass-card-base">
        <anam-agent agent-id="4c2e9235-c739-42bf-9c87-97a77dcfb07a" layout="inline"></anam-agent>
      </section>
    </main>
  </div>

  <!-- Watermark Purger Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const agent = document.querySelector('anam-agent');
      if (!agent) return;

      const purgeWatermark = () => {
        if (!agent.shadowRoot) return;
        const allElements = agent.shadowRoot.querySelectorAll('*');
        allElements.forEach(el => {
          if (el.childNodes.length === 1 && el.textContent.trim().toLowerCase() === 'anam') {
            el.style.setProperty('display', 'none', 'important');
          }
          const classStr = String(el.className || '').toLowerCase();
          const idStr = String(el.id || '').toLowerCase();
          if (classStr.includes('watermark') || classStr.includes('branding') || idStr.includes('watermark') || idStr.includes('branding')) {
            el.style.setProperty('display', 'none', 'important');
          }
        });
      };

      // Periodic check to handle dynamic re-renders inside the Web Component
      setInterval(purgeWatermark, 250);

      // Instantly run on session start and clicks
      agent.addEventListener('anam-agent:session-started', purgeWatermark);
      agent.addEventListener('click', purgeWatermark);
    });
  </script>

  <!-- Anam AI Script (Loaded Async) -->
  <script src="https://unpkg.com/@anam-ai/agent-widget" async></script>
</body>

</html>
